{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4 shadow-lg border-0">
      <div class="card-body">
        <h4 class="mb-4 text-center text-success">
          <i class="bi bi-person-plus"></i> Create Account
        </h4>
        <form method="POST" action="{{ url_for('register') }}">
          <div class="mb-3">
            <label class="form-label fw-bold">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
            <small class="text-muted">Choose a unique username</small>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <input type="password" name="password" class="form-control" required>
            <small class="text-muted">Must be at least 8 characters with letters, numbers, and symbols</small>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-success btn-lg">Register</button>
          </div>
        </form>
        <p class="mt-3 text-center">
          Already have an account? <a href="{{ url_for('login_page') }}" class="text-decoration-none">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
